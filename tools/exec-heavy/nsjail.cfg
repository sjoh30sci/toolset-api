# nsjail.cfg (exec-light) -- sandbox policy for untrusted code execution.
# Applied by executor-server via: nsjail --config /etc/nsjail/nsjail.cfg ...
# Runtime flags (--time_limit, --bindmount, --cwd) are appended per request.

name: "toolset-exec-heavy"
description: "Sandbox for .NET (csharp/dotnet), Java, Rust."

mode: ONCE
hostname: "sandbox"
cwd: "/tmp"

# Resource limits. JVM/.NET reserve large virtual address ranges, so rlimit_as
# is left generous; real memory is bounded by the cgroup v2 limit below.
time_limit: 30
rlimit_as: 4096          # address space, MB
rlimit_cpu: 60           # CPU seconds
rlimit_fsize: 200        # max file size, MB
rlimit_nofile: 1024      # open file descriptors
rlimit_nproc: 128        # processes/threads

# Namespaces: isolate everything, share nothing.
clone_newnet: true       # no network by default
clone_newuser: true
clone_newns: true
clone_newpid: true
clone_newipc: true
clone_newuts: true
clone_newcgroup: true

# cgroup v2 memory + pids caps (host must expose the cgroup v2 hierarchy).
cgroup_mem_max: 1610612736  # 1.5 GB
cgroup_pids_max: 128
use_cgroupv2: true

# Read-only bind mounts of the base runtime filesystem. The per-request work
# dir is added at runtime with --bindmount (read-write).
mount {
  src: "/bin"
  dst: "/bin"
  is_bind: true
  rw: false
}
mount {
  src: "/lib"
  dst: "/lib"
  is_bind: true
  rw: false
}
mount {
  src: "/lib64"
  dst: "/lib64"
  is_bind: true
  rw: false
  mandatory: false
}
mount {
  src: "/usr"
  dst: "/usr"
  is_bind: true
  rw: false
}
mount {
  src: "/etc"
  dst: "/etc"
  is_bind: true
  rw: false
}
mount {
  dst: "/tmp"
  fstype: "tmpfs"
  rw: true
  options: "size=100000000"
}
mount {
  src: "/dev/null"
  dst: "/dev/null"
  is_bind: true
  rw: true
}
mount {
  src: "/dev/zero"
  dst: "/dev/zero"
  is_bind: true
  rw: true
}
mount {
  src: "/dev/urandom"
  dst: "/dev/urandom"
  is_bind: true
  rw: true
}

# Seccomp: allow a broad default set; deny the dangerous outliers explicitly.
seccomp_string: "POLICY sandbox { KILL { ptrace, process_vm_readv, process_vm_writev, mount, umount2, reboot, kexec_load, init_module, finit_module, delete_module, swapon, swapoff } } USE sandbox DEFAULT ALLOW"
