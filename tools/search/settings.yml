# settings.yml — Toolset SearXNG configuration
# The secret_key is injected from the SEARXNG_SECRET environment variable
# (generated in docker-compose via `openssl rand -hex 16`). Telemetry and
# metrics are disabled; JSON output is enabled for the gateway proxy.

use_default_settings: true

general:
  instance_name: Toolset SearXNG
  debug: false
  enable_metrics: false
  autocomplete_min: 0

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "all"
  autocomplete_min: 0
  # Allow JSON so the gateway can parse results (?format=json).
  formats:
    - html
    - json

server:
  port: 8888
  bind_address: "0.0.0.0"
  secret_key: "${SEARXNG_SECRET}"
  enable_metrics: false
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true

engines:
  - name: google
    disabled: false
  - name: bing
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: brave
    disabled: false
  - name: github
    disabled: false
  - name: wikipedia
    disabled: false
  - name: wikidata
    disabled: false
  - name: arxiv
    disabled: false
  - name: pubmed
    disabled: false
  - name: stackoverflow
    disabled: false
