# docker-compose.yml
# Toolset API - Phase 1 foundation
# Local port mappings live in docker-compose.override.yml (gitignored).
# Copy docker-compose.override.yml.example -> docker-compose.override.yml to expose ports.
# Targets Compose Specification (formerly schema 3.9+); the `version` key is
# intentionally omitted as it is obsolete in modern Docker Compose.

services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: toolset/gateway:latest
    container_name: toolset-gateway
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      TOOLSET_PORT: "8080"
      TOOLSET_AUTH_MODE: "${TOOLSET_AUTH_MODE:-none}"
      TOOLSET_LOG_LEVEL: "${TOOLSET_LOG_LEVEL:-info}"
      TOOLSET_DB_PATH: "/data/toolset.db"
    volumes:
      - toolset-data:/data
      - toolset-logs:/logs
    networks:
      - toolset-network
    healthcheck:
      test: ["CMD", "/app/gateway", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  search:
    build:
      context: ./tools/search
      dockerfile: Dockerfile
    image: toolset/search:latest
    container_name: toolset-search
    restart: unless-stopped
    profiles: ["tools"]
    env_file:
      - .env.local
    environment:
      # Generate a per-run secret. Override by setting SEARXNG_SECRET in .env.local
      # (e.g. `openssl rand -hex 16`).
      SEARXNG_SECRET: "${SEARXNG_SECRET:-changeme_run_openssl_rand_hex_16}"
      SEARXNG_AUTOCOMPLETE_MIN: "0"
      SEARXNG_ENABLE_METRICS: "false"
    volumes:
      - toolset-data:/data
      - toolset-logs:/logs
    networks:
      - toolset-network
    # Internal only: port 8888 is NOT published to the host.
    expose:
      - "8888"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8888/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  exec-light:
    build:
      context: ./tools/exec-light
      dockerfile: Dockerfile
    image: toolset/exec-light:latest
    container_name: toolset-exec-light
    restart: unless-stopped
    profiles: ["tools"]
    env_file:
      - .env.local
    volumes:
      - toolset-data:/data
      - toolset-logs:/logs
    networks:
      - toolset-network
    # nsjail requires namespace/pivot_root privileges.
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    # Internal only: port 8765 is NOT published to the host.
    expose:
      - "8765"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  exec-heavy:
    build:
      context: ./tools/exec-heavy
      dockerfile: Dockerfile
    image: toolset/exec-heavy:latest
    container_name: toolset-exec-heavy
    restart: unless-stopped
    # Optional heavy tier; enable with `--profile heavy`.
    profiles: ["heavy"]
    env_file:
      - .env.local
    volumes:
      - toolset-data:/data
      - toolset-logs:/logs
    networks:
      - toolset-network
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    expose:
      - "8765"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  files-server:
    build:
      context: ./tools/files
      dockerfile: Dockerfile
    image: toolset/files-server:latest
    container_name: toolset-files-server
    restart: unless-stopped
    profiles: ["tools"]
    env_file:
      - .env.local
    environment:
      FILES_PORT: "8765"
      FILES_SANDBOX_ROOT: "/data/files"
      TOOLSET_LOG_LEVEL: "${TOOLSET_LOG_LEVEL:-info}"
    volumes:
      - toolset-data:/data
      - toolset-logs:/logs
    networks:
      - toolset-network
    # Internal only: port 8765 is NOT published to the host.
    expose:
      - "8765"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  browser:
    image: toolset/browser:latest
    container_name: toolset-browser
    restart: unless-stopped
    profiles: ["tools"]
    env_file:
      - .env.local
    volumes:
      - toolset-data:/data
      - toolset-logs:/logs
    networks:
      - toolset-network
    # Placeholder: Playwright automation added in a later phase.
    command: ["sleep", "infinity"]

volumes:
  toolset-data:
    name: toolset-data
  toolset-logs:
    name: toolset-logs

networks:
  toolset-network:
    name: toolset-network
    driver: bridge
    internal: true
